# Make sure to configure the tokens below.
name: AzureDevOps MATLAB Workflow-$(Year:yyyy).$(Month).$(DayOfMonth)-$(Rev:.r)-$(Build.BuildId)
variables:
  MW_PIPELINE_GENERATION_PACKAGE_ROOT: 'C:/Users/ahmedh/AppData/Roaming/MathWorks/MATLAB Add-Ons/PipelineGenerator@1.0.0'
  MW_RELATIVE_PROJECT_PATH: ''    # "" or "<Relative Path From Repo to main project>"
  MW_PIPELINE_GEN_DIRECTORY: '_pipelineGen_'
  MW_IR_DAG_FILE_PATH: 'pipelines/'
  # Note: You should never hardcode secrets or tokens in the YAML file.
  # For JFrog Artifactory storage services, you need to set the JFrog API token in Azure DevOps variables with the 'ARTIFACTORY_API_TOKEN_SECRET' ID.
  # For S3 storage services, you need to set the AWS S3 access key in Azure DevOps variables with the 'S3_AWS_SECRET_ACCESS_KEY_SECRET' ID.
  # For Azure Blob storage services, you need to set the Azure storage account connection string in Azure DevOps variables with the 'AZ_CONNECTION_STRING_SECRET' ID.
stages:
- stage: generate_files
  jobs:
  - job: job_generate_files
    pool: 'selfhosted_win_agents'
    variables:
      MW_PIPELINE_GEN_PATH: $(MW_RELATIVE_PROJECT_PATH)$(MW_PIPELINE_GEN_DIRECTORY)
    steps:
      - checkout: self
        fetchDepth: 0
        submodules: recursive
      - script: >
          python3 -c "import shutil,os; os.makedirs(r'$(MW_PIPELINE_GEN_PATH)', exist_ok=True);
          shutil.copy(r'$(MW_IR_DAG_FILE_PATH)ir_dag.json',r'$(MW_PIPELINE_GEN_PATH)/')"
        displayName: Copy generated files
      - publish: $(MW_PIPELINE_GEN_PATH)/
        displayName: Upload pipeline generated files
        artifact: pipeline_generated_files
- template: templates/generic-job.yml
  parameters:
    name: ci_init
    dependsOn: [generate_files]

- template: templates/generic-job.yml
  parameters:
    name: ci_setup
    dependsOn: [generate_files]

- template: templates/generic-job.yml
  parameters:
    name: ci_config
    dependsOn: [ci_init]

- template: templates/generic-job.yml
  parameters:
    name: ci_parse
    dependsOn: [ci_init]

- template: templates/generic-job.yml
  parameters:
    name: ci_validate
    dependsOn: [ci_config, ci_parse]

- template: templates/generic-job.yml
  parameters:
    name: ci_analyze
    dependsOn: [ci_config]

- template: templates/generic-job.yml
  parameters:
    name: ci_report
    dependsOn: [ci_parse, ci_analyze]

- template: templates/generic-job.yml
  parameters:
    name: ci_package
    dependsOn: [ci_report]

- template: templates/generic-job.yml
  parameters:
    name: end
    dependsOn: [ci_setup, ci_validate, ci_package]


